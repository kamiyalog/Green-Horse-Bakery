<section class="page-title">
  <h2>人物略歴</h2>

<section class="profile-page">

  <div class="profile-card">
    <h3>早川 亮太</h3>
    <p class="profile-kana">はやかわ りょうた</p>

    <p>
      早川ベーカリー店主。  
      現在は店舗運営および製造管理を行っている。
    </p>
  </div>

  <div class="profile-history">
    <h3>略歴</h3>

    <div class="profile-history-item">
      <span>1994年</span>
      <p>東雲大学 生体応用研究部門　卒業</p>
    </div>

    <div class="profile-history-item">
      <span>1995年</span>
      <p><span class="blackout"></span>研究所　入所</p>
    </div>

    <div class="profile-history-item">
      <span>2008年</span>
      <p>一身上の都合で退所</p>
    </div>

    <div class="profile-history-item">
      <span>2009年</span>
      <p>ベーカリー<span class="blackout short"></span>を立ち上げる</p>
    </div>

    <div class="profile-history-item">
      <span>同年</span>
      <p>早川涼子と婚姻し、姓を早川に変更</p>
    </div>

    <div class="profile-history-item">
      <span>2026年</span>
      <p>店舗リニューアルに併せて、店舗名を変更し、「早川ベーカリー」とする。</p>
    </div>
  </div>

  <div class="profile-note">
    <h3>注記</h3>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>お問い合わせ | 緑馬ベーカリー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-current="contact" data-page="6" data-total="24">

<div id="header"></div>

<section class="page-title">
  <h2>お問い合わせ</h2>
</section>

<section class="contact">

  <form class="contact-form" onsubmit="sendForm(event)">

    <div class="form-group">
      <label>お名前</label>
      <input type="text" required>
    </div>

    <div class="form-group">
      <label>メールアドレス</label>
      <input type="email" required>
    </div>

    <div class="form-group">
      <label>お問い合わせ種別</label>
      <select>
        <option>商品について</option>
        <option>会員サービスについて</option>
        <option>送迎サービスについて</option>
        <option>その他</option>
      </select>
    </div>

    <div class="form-group">
      <label>お問い合わせ内容</label>
      <textarea rows="8" required></textarea>
    </div>

    <button type="submit" class="send-btn">送信する</button>

  </form>

  <div id="complete" style="display:none;">
    <h3>送信を受け付けました</h3>

    <p>
      内容を確認のうえ、担当者よりご連絡いたします。
    </p>

    <div class="control-number">
      <span>管理番号</span>
      <strong>AG-1234</strong>
    </div>

    <p class="small-note">
      お問い合わせの際は、上記番号をお控えください。
    </p>
  </div>

</section>

<div id="footer"></div>

<script>
function sendForm(event) {
  event.preventDefault();
  document.querySelector(".contact-form").style.display = "none";
  document.getElementById("complete").style.display = "block";
}
</script>
<script src="search.js"></script>
<script src="include.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>職員用入口</title>
  <link rel="stylesheet" href="assets/css/staff.css">
</head>
<body data-page="9">
  <main class="staff-gate">
    <section class="staff-panel" aria-labelledby="staffTitle">
      <div class="staff-symbol" aria-hidden="true">
        <i></i><i></i><i></i>
      </div>

      <p class="staff-system-name">STAFF ACCESS SYSTEM</p>
      <h1 id="staffTitle">暗証番号を入力してください</h1>

      <form class="staff-form" data-staff-form>
        <label class="sr-only" for="staffCode">暗証番号</label>
        <input
          id="staffCode"
          name="code"
          type="password"
          inputmode="numeric"
          maxlength="16"
          placeholder="キヅイテ"
          autocomplete="off"
          autofocus
        >
        <button type="submit">確認</button>
      </form>

      <p class="staff-error" data-staff-error role="alert" hidden>暗証番号が一致しません。</p>
    </section>
  </main>

  <footer class="staff-footer">
    <p>このWebサイトの内容はフィクションであり、実在の人物・団体とは一切関係がありません。</p>
    <p class="staff-page-number">9 / 25</p>
  </footer>

  <script src="assets/js/staff.js"></script>
</body>
</html>

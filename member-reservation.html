<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>会員限定予約 | 緑馬ベーカリー</title>
  <link rel="stylesheet" href="style.css">
</head>

<body data-page="15">

<div id="header"></div>

<section class="page-title">
  <h2>会員限定予約</h2>
</section>

<section class="reservation-page">

  <div class="reservation-intro">
    <p>
      会員限定送迎サービスをご利用の方は、会員IDをご入力ください。
    </p>
  </div>

  <form class="reservation-form" onsubmit="checkReservation(event)">
    <div class="form-group">
      <label>会員ID</label>
      <input type="text" id="memberIdInput" placeholder="例：MB-0000-XX" required>
    </div>

    <button type="submit" class="send-btn">確認する</button>
  </form>

  <div id="reservationResult" class="reservation-result" style="display:none;"></div>

</section>

<div id="footer"></div>

<script src="include.js"></script>
<script src="search.js"></script>

<script>
function checkReservation(event) {
  event.preventDefault();

  const id = document.getElementById("memberIdInput").value.trim();
  const result = document.getElementById("reservationResult");

  document.querySelector(".reservation-form").style.display = "none";
  result.style.display = "block";

  if (id === "MB-0619-AK") {
    result.innerHTML = `
      <div class="result-card success">
        <h3>送迎予約を確認しました</h3>
        <p>
          ご指定の会員IDに対し、送迎サービスの利用が可能です。
        </p>
        <p>
          最寄り駅のロータリーにて、<strong>「最上送迎」</strong>と記載された車両がお待ちしております。
        </p>
        <p>
          乗車時に会員IDをお伝えください。
        </p>
      </div>
    `;
  } else {
    result.innerHTML = `
      <div class="result-card failed">
        <h3>該当する予約情報がありません</h3>
        <p>
          入力された会員IDでは、現在ご利用可能な送迎サービスは確認できませんでした。
        </p>
      </div>
    `;
  }
}
</script>

</body>
</html>
